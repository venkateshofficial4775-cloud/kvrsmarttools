<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVR Smart Tools - The Ultimate Android Utility Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5E3BEE; --secondary: #7C4DFF; --accent: #00E5FF;
            --bg-dark: #020617; --text-main: #f8fafc; --text-muted: #94a3b8;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* Announcement Bar */
        .promo-banner {
            background: linear-gradient(90deg, #1e1b4b, var(--primary), #1e1b4b);
            padding: 0.6rem; text-align: center; font-size: 0.85rem; font-weight: 500;
        }

        /* Premium Desktop Header */
        .glass-nav { position: sticky; top: 0; width: 100%; z-index: 1000; padding: 15px 0; transition: var(--transition); }
        .nav-inner-wrapper {
            margin: 0 auto; width: 90%; max-width: 1360px;
            background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 999px;
            padding: 0 2rem; height: 72px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 1.3rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 0.8rem; }
        .logo img { height: 32px; border-radius: 8px; }
        .nav-list { display: flex; gap: 2.5rem; }
        .nav-list a { color: var(--text-muted); font-weight: 500; font-size: 0.95rem; text-decoration: none; }
        .nav-list a:hover { color: #fff; }
        
        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        .nav-badge { font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 0.4rem 0.8rem; border-radius: 20px; }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; padding: 0.7rem 1.5rem; border-radius: 999px; font-weight: 600; text-decoration: none;
        }

        /* Mobile Fix */
        @media (max-width: 860px) {
            .glass-nav { top: 0; padding: 0; }
            .nav-inner-wrapper { border-radius: 0; width: 100%; padding: 0.5rem 1rem; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .nav-center { display: none; }
        }

        /* Hero Spacer */
        .hero-section { padding-top: 100px; min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div class="promo-banner">🚀 Join the exclusive Beta waitlist! 100+ Premium Utilities.</div>

    <header class="glass-nav" id="navbar">
        <div class="nav-inner-wrapper">
            <a href="#home" class="logo">
                <img src="Logo.png" alt="Logo"> KVR Smart Tools
            </a>
            <nav class="nav-center">
                <ul class="nav-list">
                    <li><a href="#features">Features</a></li>
                    <li><a href="#categories">Toolkit</a></li>
                    <li><a href="#screenshots">Gallery</a></li>
                    <li><a href="#roadmap">Roadmap</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <span class="nav-badge"><i class="ri-google-play-fill"></i> Coming Soon</span>
                <a href="#cta" class="btn btn-primary">
                    <i class="ri-download-cloud-2-line"></i> Download APK
                </a>
            </div>
        </div>
    </header>

    <main>
        <section id="home" class="hero-section">
            <div class="container">
                <h1>100+ <span class="gradient-text">Powerful Tools</span> in One App</h1>
                <p>Engineered for speed, offline use, and total privacy.</p>
                <div style="margin-top: 2rem;">
                    <a href="#cta" class="btn btn-primary btn-lg">Download APK</a>
                </div>
            </div>
        </section>

        <!-- Placeholder for other sections (Features, Categories, etc.) -->
        <section id="features" style="padding: 100px 0;">
            <div class="container"><h2>Features</h2></div>
        </section>

        <section id="cta" style="padding: 100px 0; text-align: center;">
            <div class="container">
                <h2>Ready to upgrade?</h2>
                <button class="btn btn-primary btn-lg" onclick="alert('Downloading...')">Download APK</button>
            </div>
        </section>
    </main>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    </script>
</body>
</html>
