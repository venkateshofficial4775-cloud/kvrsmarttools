    <style>

        /* ==========================================================================

           CSS Variables & Global Reset

           ========================================================================== */

        :root {

            --primary: #5E3BEE;

            --primary-hover: #4b2fc0;

            --secondary: #7C4DFF;

            --accent: #00E5FF;

            --bg-dark: #020617; /* Very dark modern navy/black */

            --bg-darker: #01030b;

            --text-main: #f8fafc;

            --text-muted: #94a3b8;

            --text-gradient: linear-gradient(180deg, #FFFFFF 0%, #94a3b8 100%);

            

            --glass-bg: rgba(15, 23, 42, 0.3);

            --glass-border: rgba(255, 255, 255, 0.05);

            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);

            

            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

            --border-radius: 24px;

            --container-width: 1240px;

        }



        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body { 

            font-family: 'Inter', system-ui, sans-serif; 

            background-color: var(--bg-dark); 

            color: var(--text-main); 

            line-height: 1.7; 

            overflow-x: hidden; 

            -webkit-font-smoothing: antialiased;

        }



        /* Preloader */

        #preloader {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: var(--bg-dark); z-index: 9999;

            display: flex; justify-content: center; align-items: center;

            transition: opacity 0.6s ease, visibility 0.6s ease;

        }

        .spinner {

            width: 40px; height: 40px; border-radius: 50%;

            border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent);

            animation: spin 0.8s linear infinite;

        }

        @keyframes spin { to { transform: rotate(360deg); } }



        /* Background Effects (Mesh & Particles) */

        .bg-mesh {

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;

            background-image: 

                radial-gradient(at 0% 0%, rgba(94, 59, 238, 0.1) 0px, transparent 50%),

                radial-gradient(at 100% 0%, rgba(0, 229, 255, 0.05) 0px, transparent 50%);

            z-index: -2; pointer-events: none;

        }

        .bg-grid {

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;

            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),

                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);

            background-size: 60px 60px; z-index: -3; pointer-events: none;

            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);

            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);

        }

        #particles {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            z-index: -1; pointer-events: none; overflow: hidden;

        }

        .particle {

            position: absolute; border-radius: 50%; background: var(--accent);

            opacity: 0; animation: floatParticle linear infinite;

        }

        @keyframes floatParticle {

            0% { transform: translateY(100vh) scale(0); opacity: 0; }

            20% { opacity: 0.4; }

            80% { opacity: 0.4; }

            100% { transform: translateY(-100px) scale(1); opacity: 0; }

        }



        a { color: var(--accent); text-decoration: none; transition: var(--transition); }

        a:hover { color: var(--text-main); }

        ul { list-style: none; }

        img { max-width: 100%; height: auto; display: block; }



        /* Typography */

        h1, h2, h3, h4, h5, h6 { font-weight: 800; line-height: 1.1; margin-bottom: 1rem; color: #fff; letter-spacing: -0.03em; }

        

        .gradient-text {

            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, var(--accent) 100%);

            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

        }

        .text-premium { background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        

        .text-center { text-align: center; }

        .w-100 { width: 100%; }



        /* Layout */

        .container { width: 90%; max-width: var(--container-width); margin: 0 auto; position: relative; z-index: 1; }

        .grid { display: grid; gap: 2.5rem; }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }

        .grid-3 { grid-template-columns: repeat(3, 1fr); }

        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 2.5rem; align-items: center; }



        @media (max-width: 1024px) { .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); } }

        @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }



        /* Promo Banner */

        .promo-banner {

            background: linear-gradient(90deg, #1e1b4b, var(--primary), #1e1b4b);

            background-size: 200% auto; color: #fff; text-align: center;

            padding: 0.6rem 1rem; font-size: 0.9rem; font-weight: 500;

            position: relative; z-index: 1002; animation: gradientMove 4s linear infinite;

        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }



        /* Premium Buttons */

        .btn {

            display: inline-flex; align-items: center; justify-content: center; gap: 0.6rem;

            padding: 0.85rem 1.8rem; border-radius: 999px; font-weight: 600; font-size: 1rem;

            cursor: pointer; border: none; transition: var(--transition);

            position: relative; overflow: hidden; letter-spacing: 0.2px; text-decoration: none;

        }

        

        .btn::after {

            content: ''; position: absolute; top: 50%; left: 50%; width: 150%; height: 150%;

            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);

            transform: translate(-50%, -50%) scale(0); transition: transform 0.4s ease-out; opacity: 0;

        }

        .btn:active::after { transform: translate(-50%, -50%) scale(1); opacity: 1; transition: 0s; }



        .btn-primary {

            background: linear-gradient(135deg, var(--primary), var(--secondary));

            color: #fff; box-shadow: 0 10px 25px -5px rgba(94, 59, 238, 0.6);

            border: 1px solid rgba(255,255,255,0.1);

        }

        .btn-primary:hover {

            transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(94, 59, 238, 0.8);

            background: linear-gradient(135deg, var(--primary-hover), var(--secondary)); color: #fff;

        }

        

        .btn-outline {

            background: rgba(255,255,255,0.02); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1);

            backdrop-filter: blur(10px);

        }

        .btn-outline:hover {

            background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); transform: translateY(-2px);

        }

        .btn-lg { padding: 1.2rem 2.8rem; font-size: 1.1rem; }



        /* Premium Glass Cards */

        .glass-card {

            background: var(--glass-bg); backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);

            border: 1px solid var(--glass-border); border-radius: var(--border-radius);

            padding: 2.5rem; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);

            transition: var(--transition); position: relative; overflow: hidden;

        }

        .glass-card::before {

            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px;

            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);

        }



        /* Phone Mockup */

        .phone-mockup {

            border: 6px solid #1e293b; border-radius: 40px; overflow: hidden;

            box-shadow: 0 30px 60px -12px rgba(0,0,0,1), 0 0 0 1px rgba(255,255,255,0.1);

            position: relative; background: #020617; margin: 0 auto; transition: var(--transition);

        }

        .phone-mockup::before {

            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);

            width: 40%; height: 28px; background: #1e293b; border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 2;

        }

        .phone-mockup img {

            border-radius: 34px; width: 100%; display: block; position: relative; z-index: 1;

            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);

        }



        /* ==========================================================================

           1. PREMIUM HEADER & NAVIGATION

           ========================================================================== */

        #scroll-progress {

            position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent));

            width: 0%; z-index: 1004; box-shadow: 0 0 15px var(--accent);

        }



        .glass-nav {

            position: fixed; top: 35px; width: 100%; z-index: 1000;

            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

        }

        .nav-inner-wrapper {

            margin: 0 auto; width: 95%; max-width: 1300px;

            background: rgba(2, 6, 23, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);

            border: 1px solid rgba(255,255,255,0.05); border-radius: 999px;

            transition: var(--transition); padding: 0.5rem 1.5rem;

        }

        

        .glass-nav.scrolled { top: 15px; }

        .glass-nav.scrolled .nav-inner-wrapper {

            background: rgba(2, 6, 23, 0.85); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8);

            border-color: rgba(255,255,255,0.1);

        }



        .nav-container { display: flex; justify-content: space-between; align-items: center; height: 60px; }

        

        .logo { font-size: 1.3rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 0.75rem; letter-spacing: -0.5px; }

        .logo img { height: 32px; width: auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        

        .nav-center { position: relative; display: flex; align-items: center; }

        .nav-list { display: flex; gap: 0.5rem; align-items: center; position: relative; }

        .nav-list li { position: relative; }

        .nav-list a { 

            color: var(--text-muted); font-weight: 500; font-size: 0.95rem; 

            padding: 0.5rem 1.2rem; border-radius: 999px; transition: all 0.3s ease; position: relative; z-index: 2;

        }

        

        /* Animated Pill Indicator */

        #nav-indicator {

            position: absolute; background: rgba(255,255,255,0.08); border-radius: 999px;

            height: 100%; top: 0; left: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1; opacity: 0;

        }

        .nav-list a:hover { color: #fff; }

        .nav-list a.active { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.4); }



        /* Right Nav Actions */

        .nav-actions { display: flex; align-items: center; gap: 1.2rem; }

        .nav-badge-play {

            display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 600;

            color: #94a3b8; padding: 0.4rem 0.8rem; border-radius: 20px;

            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);

        }

        .nav-badge-play i { color: #10B981; }



        .mobile-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }



        @media (max-width: 1060px) { .nav-badge-play { display: none; } }

        @media (max-width: 860px) {

            .mobile-toggle { display: block; z-index: 1005; }

            .nav-actions .btn { display: none; }

            .nav-inner-wrapper { border-radius: 16px; width: 100%; padding: 0.5rem 1rem; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); border-radius: 0;}

            .glass-nav { top: 35px; } .glass-nav.scrolled { top: 0; }

            

            #nav-center-wrapper {

                position: fixed; top: 0; left: -100%; width: 100%; height: 100vh;

                background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px);

                display: flex; flex-direction: column; justify-content: center; align-items: center;

                transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1004;

            }

            #nav-center-wrapper.active { left: 0; }

            .nav-list { flex-direction: column; gap: 1.5rem; }

            .nav-list a { font-size: 1.5rem; }

            #nav-indicator { display: none; }

            .nav-actions-mobile { display: flex; flex-direction: column; gap: 1rem; margin-top: 3rem; align-items: center;}

        }

        @media (min-width: 861px) { .nav-actions-mobile { display: none; } }



        /* ==========================================================================

           2. HERO SECTION

           ========================================================================== */

        .hero-section { min-height: 100vh; display: flex; align-items: center; position: relative; padding-top: 100px; }

        

        /* Gradient Lighting */

        .glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; z-index: 0; pointer-events: none; }

        .orb-1 { top: 5%; left: 5%; width: 400px; height: 400px; background: var(--primary); animation: pulseOrb 8s alternate infinite; }

        .orb-2 { bottom: 10%; right: 5%; width: 500px; height: 500px; background: var(--accent); opacity: 0.2; animation: pulseOrb 10s alternate-reverse infinite; }

        @keyframes pulseOrb { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.2); opacity: 0.5; } }



        .hero-container { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 4rem; align-items: center; }

        

        .badge-pill {

            display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.2rem; border-radius: 30px;

            font-size: 0.9rem; font-weight: 600; color: var(--text-main); margin-bottom: 2rem;

            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(10px);

        }

        .badge-pill span { color: var(--accent); }



        .hero-title { font-size: 5.5rem; line-height: 1.05; margin-bottom: 1.5rem; }

        .hero-subtitle { font-size: 1.35rem; color: var(--text-muted); margin-bottom: 3rem; max-width: 90%; font-weight: 400; }

        .hero-cta { display: flex; gap: 1.2rem; flex-wrap: wrap; }



        .hero-image { position: relative; perspective: 1000px; }

        .hero-image .phone-mockup { 

            transform: rotateY(-18deg) rotateX(8deg) translateY(0); 

            max-width: 320px; box-shadow: -30px 40px 80px rgba(0,0,0,0.8);

        }

        @keyframes floatPhone { 0% { transform: rotateY(-18deg) rotateX(8deg) translateY(0); } 50% { transform: rotateY(-18deg) rotateX(8deg) translateY(-20px); } 100% { transform: rotateY(-18deg) rotateX(8deg) translateY(0); } }



        @media (max-width: 1024px) {

            .hero-container { grid-template-columns: 1fr; text-align: center; gap: 4rem; padding-top: 4rem; }

            @keyframes floatPhoneMobile { 0% { transform: translateY(0); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0); } }

        }

        @media (max-width: 576px) { .hero-title { font-size: 3rem; } }



        /* ==========================================================================

           Animated Statistics

           ========================================================================== */

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: -3rem; position: relative; z-index: 10; padding: 0 2%; }

        .stat-card {

            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05);

            border-radius: 24px; padding: 2.5rem 1.5rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);

            transition: var(--transition);

        }

        .stat-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.15); background: rgba(15, 23, 42, 0.8); }

        .stat-number { font-size: 3.5rem; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 0.5rem; display: flex; justify-content: center; align-items: baseline; letter-spacing: -2px;}

        .stat-suffix { color: var(--accent); font-size: 2.2rem; margin-left: 2px; }

        .stat-label { color: var(--text-muted); font-size: 1rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        

        @media (max-width: 992px) { .stats-grid { grid-template-columns: repeat(2, 1fr); margin-top: 3rem; } }

        @media (max-width: 576px) { .stats-grid { grid-template-columns: 1fr; } }



        /* ==========================================================================

           Sections Layout

           ========================================================================== */

        .section { padding: 8rem 0; position: relative; }

        .bg-darker { background-color: rgba(15,23,42,0.2); border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02); }

        .section-header { text-align: center; margin-bottom: 5rem; max-width: 750px; margin-inline: auto; position: relative; z-index: 2; }

        .section-header h2 { font-size: 3.5rem; margin-bottom: 1.2rem; }

        .section-header p { color: var(--text-muted); font-size: 1.2rem; }

        @media (max-width: 768px) { .section-header h2 { font-size: 2.5rem; } }



        /* ==========================================================================

           3. FEATURES SECTION

           ========================================================================== */

        .feature-card { text-align: left; background: linear-gradient(180deg, rgba(30,41,59,0.4) 0%, rgba(15,23,42,0.1) 100%); }

        .feature-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.15); }

        /* Testimonials */

        .testi-stars { color: #F59E0B; font-size: 1.2rem; margin-bottom: 1.5rem; display: flex; gap: 0.3rem; }

        .testi-text { font-size: 1.1rem; color: var(--text-main); margin-bottom: 2rem; line-height: 1.6; }

        .testi-user { display: flex; align-items: center; gap: 1rem; }

        .testi-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: #fff; }

        .testi-info h4 { margin-bottom: 0; font-size: 1.05rem; }

        .testi-info p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0;}

        @media (max-width: 992px) { .testimonial-grid { grid-template-columns: repeat(2, 1fr); } }

        @media (max-width: 768px) { .testimonial-grid { grid-template-columns: 1fr; } }



        /* Trust Badges */

        .trust-section { padding: 4rem 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .trust-text { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 2rem; font-weight: 600;}

        .trust-badges { display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap; opacity: 0.6; }

        .trust-badges i { font-size: 2.5rem; color: #fff; transition: var(--transition); }

        .trust-badges i:hover { opacity: 1; color: var(--accent); transform: scale(1.1); }



        /* Feature Timeline / Roadmap */

        .timeline { position: relative; max-width: 800px; margin: 0 auto; padding: 2rem 0; }

        .timeline::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 90%, transparent); transform: translateX(-50%); }

        .timeline-item { margin-bottom: 4rem; position: relative; width: 50%; padding-right: 4rem; left: 0; }

        .timeline-item:nth-child(even) { left: 50%; padding-right: 0; padding-left: 4rem; text-align: left; }

        .timeline-item:nth-child(odd) { text-align: right; }

        .timeline-dot {

            position: absolute; top: 0; right: -12px; width: 24px; height: 24px; border-radius: 50%;

            background: var(--bg-dark); border: 4px solid var(--primary); z-index: 2; transition: var(--transition);

        }

        .timeline-item:hover .timeline-dot { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); transform: scale(1.2); }

        .timeline-item:nth-child(even) .timeline-dot { left: -12px; right: auto; }

        .timeline-content { background: rgba(15,23,42,0.4); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); }

        .timeline-content:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-5px); background: rgba(15,23,42,0.6); }

        .timeline-date { color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; display: inline-block; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase;}

        @media (max-width: 768px) {

            .timeline::before { left: 30px; }

            .timeline-item { width: 100%; padding-left: 70px; padding-right: 0; text-align: left !important; }

            .timeline-item:nth-child(even), .timeline-item:nth-child(odd) { left: 0; }

            .timeline-dot { left: 18px !important; right: auto !important; }

        }



        /* FAQ */

        .faq-container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.2rem; }

        .faq-item { padding: 0; background: rgba(30, 41, 59, 0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; transition: var(--transition); }

        .faq-item:hover { border-color: rgba(255,255,255,0.1); }

        .faq-question {

            width: 100%; text-align: left; padding: 1.8rem 2rem; background: transparent; border: none;

            color: #fff; font-size: 1.2rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center;

        }

        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 0 2rem; }

        .faq-answer p { padding-bottom: 1.8rem; color: var(--text-muted); font-size: 1.05rem; }

        .faq-item.active { border-color: var(--primary); background: rgba(94, 59, 238, 0.05); }

        .faq-item.active .faq-answer { max-height: 300px; }

        .faq-item.active .faq-question i { transform: rotate(45deg); color: var(--accent); }

        .faq-question i { transition: transform 0.4s ease; font-size: 1.5rem; color: var(--text-muted); }



        /* Contact Section */

        .contact-info { background: transparent; padding: 0; border: none; box-shadow: none; }

        .info-item { display: flex; gap: 1.5rem; align-items: center; padding: 2rem; background: rgba(30, 41, 59, 0.3); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.5rem; transition: var(--transition); }

        .info-item:hover { border-color: var(--primary); transform: translateX(10px); background: rgba(30, 41, 59, 0.6); }

        .icon-large { font-size: 2.5rem; color: var(--accent); background: rgba(0, 229, 255, 0.1); padding: 1.2rem; border-radius: 50%; }

        .info-item h4 { margin-bottom: 0.3rem; font-size: 1.2rem; }

        .info-item a, .info-item p { color: var(--text-muted); font-size: 1.05rem; }

        

        .form-group { margin-bottom: 1.5rem; text-align: left; }

        .form-group label { display: block; margin-bottom: 0.6rem; font-weight: 500; color: #cbd5e1; font-size: 0.95rem; }

        .glass-input {

            width: 100%; padding: 1.2rem; background: rgba(2, 6, 23, 0.5); border: 1px solid rgba(255,255,255,0.1);

            border-radius: 16px; color: #fff; font-family: inherit; font-size: 1rem; transition: var(--transition);

        }

        .glass-input:focus { outline: none; border-color: var(--accent); background: rgba(2, 6, 23, 0.8); box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1); }



        /* Premium Download CTA */

        .cta-box {

            background: linear-gradient(135deg, rgba(30,27,75,0.8), rgba(15,23,42,0.9));

            border: 1px solid rgba(94, 59, 238, 0.3); border-radius: 40px;

            padding: 6rem 3rem; text-align: center; position: relative; overflow: hidden;

            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.8);

        }

        .cta-box::before {

            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;

            background: radial-gradient(circle, rgba(94, 59, 238, 0.15) 0%, transparent 50%);

            animation: rotateGlow 15s linear infinite; pointer-events: none;

        }

        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }

        .cta-box h2 { font-size: 4rem; margin-bottom: 1.5rem; position: relative; z-index: 1; }

        .cta-box p { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 3rem; position: relative; z-index: 1; max-width: 600px; margin-inline: auto;}
